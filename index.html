<nav>

<main1>

</main1>

<main>
<h1>Menu:</h1>
<h3>Gordon Ramsay $120 for 1 day hire</h3>
   <h3> Michael Jackson $160 for 1 day hire</h3>

 <img src="gord2.jpg">

<footer>

<h1>Order Here</h1>

<form action="#" id="orderForm" novalidate onsubmit="return false;">

<input 
type="text"
id="nameInput"
list="customerSuggestions"
placeholder="name"
class="form-input"
required>

<select id="itemInput" class="form-input" required>
  <option value="">Pick an impersonator </option> 
  <option value="Michael Jackson">
    Michael Jackson - $160 for 1 day hire
  </option>

  <option value="Gordon Ramsay">
    Gordon Ramsay - $120 for 1 day hire
  </option>

  <option value="Dwayne the Rock Johnson">
    Dwayne the Rock Johnson - $140 for 1 day hire
  </option>

  <option value="David Attenborough">
    David Attenborough - $100 for 1 day hire
  </option>
  </select>


  <label for="name">Name:</label>
  <input type="text" id="name" name="name" required>
  <br><br>
  <label for="money">Money:</label>
  <input type="number" id="money" name="money" required>
  <br><br>
  <label for="order">Order:</label>
  <input type="text" id="order" name="order" required>
  <br><br>

<button
  type="button"
  onClick="addItem()"
  class ="submit-button">
  Submit
</button>
