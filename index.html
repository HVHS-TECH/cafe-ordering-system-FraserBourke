  </option>
  </select>


  <input 
type="text"
id="moneyInput"
list="priceSuggestions"
placeholder="money"
class="form-input"
required>
  

<datalist id="priceSuggestions">
  <option value="150">
  <option value="100">
  <option value="120">

<button
